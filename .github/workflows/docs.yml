name: Deploy Manual

on:
  push:
    branches: [main]
    paths:
      - 'manual/**'
      - 'tooling/pnpm-lock.yaml'
      - 'tooling/pnpm-workspace.yaml'
      - 'tooling/packages/vscode-aivi/syntaxes/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: tooling/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: tooling

      - name: Compute manual base path
        id: manual-base
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          if [[ "${repo_name}" == *.github.io ]]; then
            echo "base=/" >> "${GITHUB_OUTPUT}"
          else
            echo "base=/${repo_name}/" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build docs
        run: pnpm build
        working-directory: manual
        env:
          AIVI_MANUAL_BASE: ${{ steps.manual-base.outputs.base }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: manual/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
